services:
  backend:
    build: ./backend
    ports:
      - "8005:8000"
    env_file: ./backend/.env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pm-net

networks:
  pm-net:
    driver: bridge
